- pipeline: register-github-webhook
  name: Register GitHub Webhook
  refs:
  - refs/heads/master
  fail_on_prepare_env_warning: true
  variables:
  - key: BUDDY_WEBHOOK_URL
    value: '!encrypted lQOp7VoARoHibmszZOUzb7eBxIBq0hrXmCKNdVNoFsuviKNQYIMPR4Bh2lY9Ec6/Z5Sc+CItbbCNJhbQ6UNzOt/Z1Opw8bTsWB4uhK3vomvUdFeLQ8V6133SPkOsiH41R7bAclcqSmjD6lPc65HoYltlYgUcYA4X75cmjHFWDCMoEILdIAaRMvx6mzgkKM+5.Q171cdVeAfl6S+jm7fRS+g=='
    encrypted: true
  - key: GH_REPO
    value: JakubJKrawczyk/GraphBasedNN
  actions:
  - action: Create/Update push webhook on GitHub
    type: GIT_HUB_CLI
    shell: BASH
    commands: |-
      set -euo pipefail
      gh auth setup-git

      REPO="$GH_REPO"
      URL="$BUDDY_WEBHOOK_URL"

      # Idempotentnie: czy webhook o tym URL już istnieje?
      HOOK_ID=$(gh api "repos/$REPO/hooks" \
        --jq ".[] | select(.config.url==\"$URL\") | .id" 2>/dev/null | head -n1 || true)

      if [ -n "${HOOK_ID:-}" ]; then
        echo "Webhook istnieje (id=$HOOK_ID) -> PATCH"
        gh api -X PATCH "repos/$REPO/hooks/$HOOK_ID" --input - <<EOF
      { "active": true,
        "events": ["push"],
        "config": { "url": "$URL", "content_type": "json", "insecure_ssl": "0" } }
      EOF
      else
        echo "Brak webhooka -> POST (tworze nowy)"
        gh api -X POST "repos/$REPO/hooks" --input - <<EOF
      { "name": "web", "active": true,
        "events": ["push"],
        "config": { "url": "$URL", "content_type": "json", "insecure_ssl": "0" } }
      EOF
      fi

      echo "Aktualne webhooki:"
      gh api "repos/$REPO/hooks" --jq '.[] | {id, url: .config.url, events}'
    integration: VNA4o5pmWZdP5BpWeKgRlQ6v0r
